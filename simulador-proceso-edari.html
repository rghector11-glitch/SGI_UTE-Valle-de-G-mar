// ─── Motor ────────────────────────────────────────────────────────────────────
function calcular(p) {
  const Q=Number(p.caudal)||0, Vr=Number(p.vol_reactor)||1;
  const Xr=Number(p.sst_reactor)||0, Xw=Number(p.sst_recirculacion)||1;
  const Xe=Number(p.sst_efluente)||0, Qw_d=Number(p.caudal_purga_d)||0;
  const Qr=Number(p.caudal_recirculacion)||0, tc_obj=Number(p.edad_objetivo)||15;
  const dbo_in=Number(p.dbo_entrada)||0, dqo_in=Number(p.dqo_entrada)||0;
  const nh4_in=Number(p.nh4_entrada)||0, pt_in=Number(p.pt_entrada)||0;
  const dbo_ef=Number(p.dbo_efluente)||0;
  const dqo_ef=Number(p.dqo_efluente)||0, nh4_ef=Number(p.nh4_efluente)||0;
  const pt_ef=Number(p.pt_efluente)||0;
  const od=Number(p.od)||0, Qd=Q, ss_ef=Xe;
  const hlf=Number(p.hlf)||0, h_dec=Number(p.h_decantador)||1;

  const M=Xr*Vr/1000, FQwXw=Qw_d*Xw/1000, FQeXe=Qd*Xe/1000;
  const F_sal=FQwXw+FQeXe, tc=F_sal>0?M/F_sal:0;
  const rend_dbo=dbo_in>0?Math.max(0,(dbo_in-dbo_ef)/dbo_in*100):0;
  const rend_dqo=dqo_in>0?Math.max(0,(dqo_in-dqo_ef)/dqo_in*100):0;
  const rend_nh4=nh4_in>0?Math.max(0,(nh4_in-nh4_ef)/nh4_in*100):0;
  const rend_pt=pt_in>0?Math.max(0,(pt_in-pt_ef)/pt_in*100):0;
  const IR=Q>0?Qr/Q*100:0;
  const TRH=Q>0?Vr/Q*24:0, FM=M>0?dbo_in*Qd/1000/M:0;
  const Cv=Vr>0?dbo_in*Qd/(Vr*1000):0;
  const dbo_elim_d=(dbo_in-dbo_ef)*Qd/1000;
  const Yobs=dbo_elim_d>0&&tc>0?M/(dbo_elim_d*tc):0;
  const Px=Yobs*dbo_elim_d, acum=Px-F_sal;
  const FQwXw_nec=Math.max(0,M/tc_obj-FQeXe);
  const Qw_nec=Xw>0?FQwXw_nec*1000/Xw:0;
  const ivf_raw=120-od*15-(Xr/1000)*4+(tc>20?(tc-20)*2:0);
  const ivf=Math.min(300,Math.max(50,ivf_raw));
  const margen_libre=h_dec>0?h_dec-hlf:0;
  const ivf_real=h_dec>0&&Xr>0?(hlf/h_dec)*(1000/Xr)*1000:0;
  const pct_lecho=h_dec>0?hlf/h_dec*100:0;
  const alerta_lecho=pct_lecho>70;
  const limites={dbo:25,dqo:125,ss:35,nh4:10,nt:15,pt:2};
  const alertas=[];
  if(dbo_ef>limites.dbo)alertas.push({param:'DBO₅',valor:dbo_ef.toFixed(1),limite:limites.dbo});
  if(dqo_ef>limites.dqo)alertas.push({param:'DQO',valor:dqo_ef.toFixed(1),limite:limites.dqo});
  if(ss_ef>limites.ss)alertas.push({param:'SS',valor:ss_ef.toFixed(1),limite:limites.ss});
  if(nh4_ef>limites.nh4)alertas.push({param:'Nt',valor:nh4_ef.toFixed(1),limite:limites.nh4});
  if(pt_ef>limites.pt)alertas.push({param:'Pt',valor:pt_ef.toFixed(1),limite:limites.pt});
  return {M,FQwXw,FQeXe,F_sal,tc,Qd,rend_dbo,rend_dqo,rend_nh4,rend_pt,IR,TRH,FM,Cv,
    Yobs,Px,acum,Qw_nec,FQwXw_nec,dbo_ef,dqo_ef,nh4_ef,pt_ef,ss_ef,ivf,limites,alertas,
    margen_libre,ivf_real,pct_lecho,alerta_lecho};
}

function Slider({label,unit,min,max,step,value,onChange,color,C,compact=false}){
  const pct=((value-min)/(max-min))*100;
  return(
    <div style={{marginBottom:compact?9:14}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
        <span style={{fontSize:compact?9:10,color:C.muted,textTransform:'uppercase',letterSpacing:1}}>{label}</span>
        <span style={{fontSize:compact?11:12,fontWeight:700,color,fontFamily:'monospace'}}>
          {value%1===0?value:value.toFixed(1)}<span style={{fontSize:8,color:C.muted,marginLeft:2}}>{unit}</span>
        </span>
      </div>
      <div style={{position:'relative',height:3,background:C.inputBg,borderRadius:2}}>
        <div style={{position:'absolute',inset:0,width:`${pct}%`,background:`linear-gradient(90deg,${color}44,${color})`,borderRadius:2}}/>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e=>onChange(Number(e.target.value))}
          style={{position:'absolute',top:-9,left:0,width:'100%',height:20,opacity:0,cursor:'pointer',margin:0}}/>
        <div style={{position:'absolute',top:-5,left:`calc(${pct}% - 5px)`,width:10,height:10,
          borderRadius:'50%',background:color,pointerEvents:'none'}}/>
      </div>
    </div>
  );
}

function NumInput({label,unit,value,onChange,color,C,compact=false}){
  const [local,setLocal]=React.useState(String(value));
  React.useEffect(()=>{ setLocal(String(value)); },[value]);
  const commit=()=>{
    const n=parseFloat(local);
    if(!isNaN(n)) onChange(n);
    else setLocal(String(value));
  };
  return(
    <div style={{marginBottom:compact?7:12}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
        <span style={{fontSize:compact?9:10,color:C.muted,textTransform:'uppercase',letterSpacing:1}}>{label}</span>
        <span style={{fontSize:8,color:C.muted}}>{unit}</span>
      </div>
      <input type="number" value={local}
        onChange={e=>setLocal(e.target.value)}
        onBlur={commit}
        onKeyDown={e=>{ if(e.key==='Enter'){ commit(); e.target.blur(); } }}
        style={{width:'100%',background:C.inputBg,border:`1px solid ${C.inputBorder}`,borderRadius:4,
          color,fontFamily:'monospace',fontSize:compact?11:13,fontWeight:700,
          padding:compact?'4px 7px':'6px 9px',outline:'none',boxSizing:'border-box'}}/>
    </div>
  );
}

function Gauge({label,value,limite,unit,C,compact=false}){
  const ok=value<=limite,col=ok?C.green:C.danger;
  const pct=Math.min(100,value/(limite*1.6)*100);
  return(
    <div style={{flex:'1 1 70px',background:C.inputBg,border:`1px solid ${ok?C.green+'40':C.danger+'40'}`,
      borderRadius:7,padding:compact?'6px 8px':'10px 12px'}}>
      <div style={{fontSize:8,color:C.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>{label}</div>
      <div style={{fontSize:compact?14:18,fontWeight:800,color:col,fontFamily:'monospace'}}>
        {value.toFixed(1)}<span style={{fontSize:7,color:C.muted,marginLeft:2}}>{unit}</span>
      </div>
      <div style={{height:2,background:C.border,borderRadius:1,margin:'4px 0 2px'}}>
        <div style={{height:'100%',width:`${pct}%`,background:col,borderRadius:1,transition:'width .4s'}}/>
      </div>
      <div style={{fontSize:7,color:C.muted}}>Lím. {limite} {unit}</div>
    </div>
  );
}

function SecHdr({label,color,C,mt=false}){

// ─── Diagrama ─────────────────────────────────────────────────────────────────
function Diagrama({p,res,t,C,onGoDec}){
  const ok=res.alertas.length===0,ec=ok?C.green:C.danger;
  const wD='#4a3a18',wM='#1a2e38',wC=ok?'#0d3a2a':'#3a0d12',wS='#1a2e0a';
  function Arr({x1,y1,x2,y2,color=C.muted,w=4,dash=''}){
    const dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy);
    if(l<1)return null;
    const ux=dx/l,uy=dy/l;
    return(<>
      <line x1={x1} y1={y1} x2={x2-ux*6} y2={y2-uy*6} stroke={color} strokeWidth={w} strokeDasharray={dash} opacity={0.6}/>
      <polygon points={`${x2},${y2} ${x2-uy*4-ux*7},${y2+ux*4-uy*7} ${x2+uy*4-ux*7},${y2-ux*4-uy*7}`} fill={color} opacity={0.85}/>
    </>);
  }
  return(
    <svg viewBox="0 0 900 300" style={{width:'100%',height:'auto'}}>

// ─── Dashboard Decantador ─────────────────────────────────────────────────────
function calcularDec(p){
  const Q_bio=Number(p.caudal)||0, Q_recirc=Number(p.caudal_recirculacion)||0;
  const SST_r=Number(p.sst_reactor)||1;
  const HLF=Number(p.hlf)||0, H_dec=Number(p.h_decantador)||1, S_dec=Number(p.s_decantador)||1;
  const Q_dec=Q_bio+Q_recirc, Vol_dec=S_dec*H_dec;
  const CHS=S_dec>0?(Q_dec/24)/S_dec:0;
  const CSS=S_dec>0?(Q_dec*SST_r/1000/24)/S_dec:0;
  const TRH_dec=Q_dec>0?Vol_dec/Q_dec*24:0;
  const vel_sed=TRH_dec>0?H_dec/TRH_dec:0;
  const pct=H_dec>0?HLF/H_dec*100:0, margen=H_dec-HLF;
  const ivf=H_dec>0&&SST_r>0?(HLF/H_dec)*(1000/SST_r)*1000:0;
  return{Q_dec,Vol_dec,CHS,CSS,TRH_dec,vel_sed,pct,margen,ivf,
    alerta_lecho:pct>70, alerta_chs:CHS>1.5, alerta_css:CSS>6};
}

function PanelDecantador({p,C,t,set}){
  const d=calcularDec(p);
  const lCol=d.alerta_lecho?C.danger:C.orange;

  // ── Histórico ──────────────────────────────────────────────────────────────
  const HIST_KEY='edar_lecho_hist';
  const MAX_DIAS=90;
  const [hist,setHist]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem(HIST_KEY)||'[]'); }catch(e){return [];}
  });
  const [confirmBorrar,setConfirmBorrar]=useState(false);
  const [nota,setNota]=useState('');
  const [fechaManual,setFechaManual]=useState(()=>new Date().toISOString().slice(0,10));

  function guardarLectura(){
    const now=fechaManual?new Date(fechaManual+'T12:00:00'):new Date();
    const entry={
      ts: now.toISOString(),
      fecha: now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}),
      hora:  new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
      hlf:   Number(p.hlf),
      pct:   Number(d.pct.toFixed(1)),
      margen:Number(d.margen.toFixed(2)),
      ivf:   Number(d.ivf.toFixed(0)),
      chs:   Number(d.CHS.toFixed(3)),
      nota:  nota.trim(),
    };
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-MAX_DIAS);
    const nuevo=[...hist.filter(h=>new Date(h.ts)>cutoff), entry];
    setHist(nuevo);
    localStorage.setItem(HIST_KEY, JSON.stringify(nuevo));
    setNota('');
  }

  function exportarCSV(){
    const cab='Fecha,Hora,Lecho(m),%(ocup),Margen(m),IVF(mL/g),CHS(m3/m2h),Nota';
    const filas=hist.map(h=>[h.fecha,h.hora,h.hlf,h.pct,h.margen,h.ivf,h.chs||'',`"${(h.nota||'').replace(/"/g,'""')}"`].join(','));
    const csv=[cab,...filas].join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='historico_decantador.csv';
    a.click();
  }

  function borrarHistorico(){
    setHist([]); localStorage.removeItem(HIST_KEY); setConfirmBorrar(false);
  }

  // Gráfica SVG simple de línea
  function Grafica(){
    if(hist.length<2) return(
      <div style={{textAlign:'center',padding:'20px 0',color:C.muted,fontSize:9}}>
        Guarda al menos 2 lecturas para ver la evolución
      </div>
    );
    const W=420, H=90, PL=36, PR=8, PT=8, PB=20;
    const gW=W-PL-PR, gH=H-PT-PB;
    const valsRaw=hist.map(h=>h.hlf);
    const vals=interpolarCeros(valsRaw);
    const minV=Math.min(...vals), maxV=Math.max(...vals);
    const rng=maxV-minV||1;
    const alerta70=Number(p.h_decantador)*0.7;
    const y70=PT+gH-(alerta70-minV)/rng*gH;
    const pts=hist.map((h,i)=>{
      const x=PL+i/(hist.length-1)*gW;
      const y=PT+gH-(vals[i]-minV)/rng*gH;
      return{x,y,h,interpolado:valsRaw[i]===0&&vals[i]!==0};
    });
    const polyline=pts.map(p=>`${p.x},${p.y}`).join(' ');
    const area=[`${pts[0].x},${PT+gH}`,...pts.map(p=>`${p.x},${p.y}`),`${pts[pts.length-1].x},${PT+gH}`].join(' ');
    const yLabels=[minV, (minV+maxV)/2, maxV];
    const xIdxs=[0, Math.floor((hist.length-1)/2), hist.length-1];
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        <polygon points={area} fill={lCol} opacity="0.08"/>
        {alerta70>=minV&&alerta70<=maxV&&(
          <>
            <line x1={PL} y1={y70} x2={W-PR} y2={y70} stroke={C.danger} strokeWidth="0.8" strokeDasharray="3,2" opacity="0.6"/>
            <text x={PL+2} y={y70-2} fill={C.danger} fontSize="5.5" opacity="0.8">70%</text>
          </>
        )}
        {[0,0.5,1].map((f,i)=>(
          <line key={i} x1={PL} y1={PT+gH*f} x2={W-PR} y2={PT+gH*f}
            stroke={C.border} strokeWidth="0.5" opacity="0.5"/>
        ))}
        <polyline points={polyline} fill="none" stroke={lCol} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        {pts.map((p,i)=>(
          p.interpolado
            ? <circle key={i} cx={p.x} cy={p.y} r="3" fill="none" stroke={lCol} strokeWidth="1.2" strokeDasharray="2,1" opacity="0.7"/>
            : <circle key={i} cx={p.x} cy={p.y} r="2.5"
                fill={p.h.pct>70?C.danger:p.h.pct>50?C.warn:C.green} stroke={C.bg} strokeWidth="1"/>
        ))}
        {yLabels.map((v,i)=>(
          <text key={i} x={PL-3} y={PT+gH*(1-i*0.5)+3} textAnchor="end"
            fill={C.muted} fontSize="6" fontFamily="monospace">{v.toFixed(2)}</text>
        ))}
        {xIdxs.filter(i=>i<hist.length).map(i=>(
          <text key={i} x={PL+i/(hist.length-1)*gW} y={H-2} textAnchor="middle"
            fill={C.muted} fontSize="5.5" fontFamily="monospace">
            {hist[i].fecha}
          </text>
        ))}
        <text x={PL-3} y={PT-1} textAnchor="end" fill={C.muted} fontSize="5.5">m</text>
      </svg>
    );
  }

  function KPI({label,value,unit,color,ok,rng,alert}){

              <line x1="148" y1="10" x2="148" y2={10+150*(1-pct/100)} stroke={C.green} strokeWidth="1" opacity="0.6"/>
              {(1-pct/100)>0.15&&<text x="156" y={10+75*(1-pct/100)} textAnchor="middle" fill={C.green} fontSize="5.5" fontFamily="monospace"
                transform={`rotate(-90,156,${10+75*(1-pct/100)})`}>{d.margen.toFixed(2)}m</text>}
            </svg>
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:7}}>
            {[
              {l:t.lechoFangos,   v:p.hlf.toFixed(2),          u:'m',    col:d.alerta_lecho?C.danger:C.orange},
              {l:t.altDecantador, v:p.h_decantador.toFixed(1),  u:'m',    col:C.muted},
              {l:'% ocupado',     v:d.pct.toFixed(1),           u:'%',    col:d.pct>70?C.danger:d.pct>50?C.warn:C.green},
              {l:t.margenLibre,   v:d.margen.toFixed(2),        u:'m',    col:d.margen>0.8?C.green:d.margen>0.4?C.warn:C.danger},
              {l:t.ivfReal,       v:d.ivf.toFixed(0),           u:'mL/g', col:d.ivf<120?C.green:d.ivf<180?C.warn:C.danger},
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'5px 8px',background:C.panel,borderRadius:5,border:`1px solid ${C.border}22`}}>
                <span style={{fontSize:9,color:C.muted}}>{r.l}</span>
                <span style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:r.col}}>
                  {r.v}<span style={{fontSize:7,color:C.muted,marginLeft:2}}>{r.u}</span>
                </span>
              </div>
            ))}
            {d.alerta_lecho&&(
              <div style={{background:'#120508',border:`1px solid ${C.danger}40`,borderRadius:5,
                padding:'5px 8px',fontSize:8,color:C.danger,fontWeight:700}}>{t.alertaLecho}</div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',gap:12,height:'100%',overflow:'hidden'}}>
      {/* Col izq: parámetros */}
      <div style={{width:195,flexShrink:0,overflowY:'auto'}}>
        <SecHdr label={t.instFijos} color={C.orange} C={C}/>
        <NumInput label={t.supDecantador} unit="m²" value={p.s_decantador} onChange={set('s_decantador')} color={C.muted}   C={C} compact={true}/>
        <NumInput label={t.altDecantador} unit="m"  value={p.h_decantador} onChange={set('h_decantador')} color={C.muted}   C={C} compact={true}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          background:C.inputBg,border:`1px solid ${C.muted}20`,borderRadius:5,padding:'5px 8px',marginBottom:12}}>
          <span style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:1}}>{t.volDecantador}</span>
          <span style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:C.text}}>
            {d.Vol_dec.toFixed(0)}<span style={{fontSize:7,color:C.muted,marginLeft:2}}>m³</span>
          </span>
        </div>
        <SecHdr label={t.datosCampo} color={C.accent} C={C} mt/>
        <NumInput label={t.lechoFangos}  unit="m"    value={p.hlf}                  onChange={set('hlf')}                  color={C.orange} C={C} compact={true}/>
        <NumInput label={t.sstReactor}   unit="mg/L" value={p.sst_reactor}          onChange={set('sst_reactor')}          color={C.purple} C={C} compact={true}/>
        <NumInput label={t.caudalRecirc} unit="m³/d" value={p.caudal_recirculacion} onChange={set('caudal_recirculacion')} color={C.warn}   C={C} compact={true}/>
        <NumInput label={t.caudalBio}    unit="m³/d" value={p.caudal}               onChange={set('caudal')}               color={C.accent} C={C} compact={true}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          background:C.inputBg,border:`1px solid ${C.accent}30`,borderRadius:5,padding:'5px 8px',marginBottom:7}}>
          <span style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:1}}>{t.caudalDecantador}</span>
          <span style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:C.accent}}>
            {d.Q_dec.toFixed(0)}<span style={{fontSize:7,color:C.muted,marginLeft:2}}>m³/d</span>
          </span>
        </div>
        <div style={{height:1,background:C.border,margin:'4px 0 10px'}}/>
        <div style={{marginBottom:6}}>
          <div style={{fontSize:7,color:C.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>Fecha lectura</div>
          <input type="date" value={fechaManual} onChange={e=>setFechaManual(e.target.value)}
            style={{width:'100%',background:C.inputBg,border:`1px solid ${C.inputBorder}`,borderRadius:5,
              padding:'4px 7px',fontSize:9,color:C.text,outline:'none',fontFamily:'monospace',
              colorScheme:'dark'}}/>
        </div>
        <input value={nota} onChange={e=>setNota(e.target.value)}
          placeholder="Nota opcional..."
          style={{width:'100%',background:C.inputBg,border:`1px solid ${C.inputBorder}`,borderRadius:5,
            padding:'5px 8px',fontSize:9,color:C.text,outline:'none',marginBottom:6,fontFamily:'inherit'}}/>
        <button onClick={guardarLectura}
          style={{width:'100%',background:C.green,border:'none',borderRadius:6,padding:'8px 0',
            cursor:'pointer',fontSize:10,fontWeight:700,color:C.bg,letterSpacing:0.5}}>
          ✚ Guardar lectura
        </button>
        <div style={{fontSize:7,color:C.muted,textAlign:'center',marginTop:4}}>
          {hist.length} registro{hist.length!==1?'s':''} guardado{hist.length!==1?'s':''}
        </div>
        {hist.length>0&&(
          <>
          <button onClick={exportarCSV}
            style={{width:'100%',marginTop:6,background:'none',border:`1px solid ${C.accent}50`,
              borderRadius:5,padding:'4px 0',cursor:'pointer',fontSize:8,color:C.accent}}>
            ⬇ Exportar CSV
          </button>
          {confirmBorrar
          ? <div style={{marginTop:6,background:'#120508',border:`1px solid ${C.danger}40`,borderRadius:5,padding:'7px 8px'}}>
              <div style={{fontSize:8,color:C.danger,marginBottom:6}}>¿Borrar todo el histórico?</div>
              <div style={{display:'flex',gap:5}}>
                <button onClick={borrarHistorico}
                  style={{flex:1,background:C.danger,border:'none',borderRadius:4,padding:'4px 0',
                    cursor:'pointer',fontSize:9,fontWeight:700,color:'#fff'}}>Sí</button>
                <button onClick={()=>setConfirmBorrar(false)}
                  style={{flex:1,background:C.border,border:'none',borderRadius:4,padding:'4px 0',
                    cursor:'pointer',fontSize:9,color:C.text}}>No</button>
              </div>
            </div>
          : <button onClick={()=>setConfirmBorrar(true)}
              style={{width:'100%',marginTop:6,background:'none',border:`1px solid ${C.border}`,
                borderRadius:5,padding:'4px 0',cursor:'pointer',fontSize:8,color:C.muted}}>
              🗑 Borrar histórico
            </button>
          }
          </>
        )}
        <button onClick={()=>generarInformePDF(p,null,'decantador',calcularDec(p),null,hist)}
          style={{width:'100%',marginTop:10,background:'none',border:`1px solid ${C.orange}50`,
            borderRadius:6,padding:'7px 0',cursor:'pointer',fontSize:9,color:C.orange,fontWeight:700}}>
          🖨 Imprimir informe
        </button>
      </div>
      {/* Col central: diagrama + KPIs + fórmulas */}
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:12}}>
        <SeccionDec/>
        <div>
          <div style={{fontSize:8,color:C.muted,textTransform:'uppercase',letterSpacing:2,marginBottom:8}}>▸ {t.calculados}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <KPI label={t.chsLabel} value={d.CHS.toFixed(2)}     unit="m³/m²·h"   color={C.accent} ok={d.CHS>=0.5&&d.CHS<=1.5}       rng={t.chsRng} alert={d.alerta_chs?t.chsAlerta:null}/>
            <KPI label={t.cssLabel} value={d.CSS.toFixed(2)}     unit="kgSS/m²·h" color={C.purple} ok={d.CSS<=6}                      rng={t.cssRng} alert={d.alerta_css?t.cssAlerta:null}/>
            <KPI label={t.trhDec}   value={d.TRH_dec.toFixed(2)} unit="h"          color={C.green}  ok={d.TRH_dec>=1.5&&d.TRH_dec<=3} rng={t.trhRng}/>
            <KPI label={t.velSed}   value={d.vel_sed.toFixed(2)} unit="m/h"        color={C.warn}   ok={d.vel_sed>=1.5}                rng={t.velSedRng}/>
          </div>
        </div>
        <div style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:7,overflow:'hidden'}}>
          <details>
            <summary style={{padding:'7px 11px',cursor:'pointer',fontSize:9,color:C.muted,
              textTransform:'uppercase',letterSpacing:2,fontWeight:700,
              display:'flex',justifyContent:'space-between',alignItems:'center',listStyle:'none'}}>
              <span>ƒ {t.formulasAplicadas}</span><span>▼</span>
            </summary>
            <div style={{padding:'0 10px 10px',overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:9}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${C.border}`}}>
                    {['Parámetro','Expresión','Resultado'].map(h=>(
                      <th key={h} style={{textAlign:'left',color:C.muted,padding:'3px 5px',fontWeight:600,fontSize:8}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {l:'Caudal decantador', f:'Q_dec = Q_bio + Q_recirc',                      r:`${d.Q_dec.toFixed(0)} m³/d`},
                    {l:'Volumen',           f:'V = S × H_útil',                                r:`${d.Vol_dec.toFixed(0)} m³`},
                    {l:'Carga hidr. sup.',  f:'CHS = (Q_dec / 24) / S',                        r:`${d.CHS.toFixed(3)} m³/m²·h`},
                    {l:'Carga sólidos',     f:'CSS = (Q_dec × SST_r / 1000 / 24) / S',        r:`${d.CSS.toFixed(3)} kgSS/m²·h`},
                    {l:'TRH decantador',    f:'TRH = V / Q_dec × 24',                          r:`${d.TRH_dec.toFixed(2)} h`},
                    {l:'Vel. sedim. apar.', f:'v_s = H_útil / TRH',                            r:`${d.vel_sed.toFixed(2)} m/h`},
                    {l:'% lecho',           f:'% = HLF / H_útil × 100',                        r:`${d.pct.toFixed(1)} %`},
                    {l:'Margen libre',      f:'M = H_útil − HLF',                              r:`${d.margen.toFixed(2)} m`},
                    {l:'IVF real',          f:'IVF = (HLF/H_útil) × (1000/SST_r) × 1000',    r:`${d.ivf.toFixed(0)} mL/g`},
                  ].map((r,i)=>(
                    <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i%2===0?'transparent':C.panel}}>
                      <td style={{padding:'4px 5px',color:C.accent,whiteSpace:'nowrap'}}>{r.l}</td>
                      <td style={{padding:'4px 5px',color:C.text,fontFamily:'monospace',whiteSpace:'nowrap'}}>{r.f}</td>
                      <td style={{padding:'4px 5px',color:C.green,fontFamily:'monospace',textAlign:'right',whiteSpace:'nowrap'}}>{r.r}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </details>
        </div>
        {/* Histórico */}
        {hist.length>0&&(
          <div style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:8,color:C.muted,textTransform:'uppercase',letterSpacing:2}}>▸ Evolución lecho de fangos</div>
              <div style={{fontSize:7,color:C.muted}}>{hist.length} lecturas · últimos 90 días</div>
            </div>
            <Grafica/>
            {/* Mini tabla últimas 8 lecturas */}
            <div style={{marginTop:10,overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:8.5}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${C.border}`}}>
                    {['Fecha','Hora','Lecho m','% ocup.','Margen m','IVF mL/g','Nota'].map(h=>(
                      <th key={h} style={{padding:'3px 6px',color:C.muted,fontWeight:600,textAlign:'right',whiteSpace:'nowrap'}}>
                        {h}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...hist].reverse().slice(0,8).map((h,i)=>(
                    <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i%2===0?'transparent':C.panel}}>
                      <td style={{padding:'3px 6px',color:C.muted,whiteSpace:'nowrap'}}>{h.fecha}</td>
                      <td style={{padding:'3px 6px',color:C.muted,whiteSpace:'nowrap'}}>{h.hora}</td>
                      <td style={{padding:'3px 6px',fontFamily:'monospace',fontWeight:700,textAlign:'right',
                        color:h.pct>70?C.danger:h.pct>50?C.warn:C.green}}>{h.hlf.toFixed(2)}</td>
                      <td style={{padding:'3px 6px',fontFamily:'monospace',textAlign:'right',
                        color:h.pct>70?C.danger:h.pct>50?C.warn:C.green}}>{h.pct.toFixed(1)}</td>
                      <td style={{padding:'3px 6px',fontFamily:'monospace',textAlign:'right',
                        color:h.margen>0.8?C.green:h.margen>0.4?C.warn:C.danger}}>{h.margen.toFixed(2)}</td>
                      <td style={{padding:'3px 6px',fontFamily:'monospace',textAlign:'right',
                        color:h.ivf<120?C.green:h.ivf<180?C.warn:C.danger}}>{h.ivf}</td>
                      <td style={{padding:'3px 6px',color:C.muted,fontSize:8,maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.nota||'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Histórico Reactor ────────────────────────────────────────────────────────
function PanelHistoricoReactor({p,res,C,t}){
  const HKEY='edar_reactor_hist', MAX=90;
  const [hist,setHist]=useState(()=>{try{return JSON.parse(localStorage.getItem(HKEY)||'[]');}catch(e){return [];}});
  const [nota,setNota]=useState('');
  const [confirmBorrar,setConfirmBorrar]=useState(false);
  const [fechaManual,setFechaManual]=useState(()=>new Date().toISOString().slice(0,10));

  function guardar(){
    const now=fechaManual?new Date(fechaManual+'T12:00:00'):new Date();
    const entry={
      ts:now.toISOString(),
      fecha:now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}),
      hora:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
      tc:Number(res.tc.toFixed(1)),
      fm:Number(res.FM.toFixed(3)),
      rend_dbo:Number(res.rend_dbo.toFixed(1)),
      rend_nh4:Number(res.rend_nh4.toFixed(1)),
            rend_pt:Number(res.rend_pt.toFixed(1)),
      sst:Number(p.sst_reactor),
      purga:Number(p.caudal_purga_d),
      nota:nota.trim(),
    };
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-MAX);
    const nuevo=[...hist.filter(h=>new Date(h.ts)>cutoff),entry];
    setHist(nuevo); localStorage.setItem(HKEY,JSON.stringify(nuevo)); setNota('');
    // Sync to Firebase reactor-history
    if(window._fb){
      try{
        window._fb.set(window._fb.ref(window._fb.db,'reactor-history'), nuevo)
          .catch(e=>console.warn('Firebase reactor-history error:',e));
      }catch(e){}
    }
    // Notify portal to refresh Tendencias
    try{ window.parent.postMessage({type:'sim-history', hist:nuevo}, '*'); }catch(e){}
  }

  function borrar(){setHist([]);localStorage.removeItem(HKEY);setConfirmBorrar(false);}

  function exportarCSV(){
    const cab='Fecha,Hora,EdadFango(d),F/M,Rend.DBO%,Rend.Nt%,Rend.Pt%,SST(mg/L),Purga(m3/d),Nota';
    const filas=hist.map(h=>[h.fecha,h.hora,h.tc,h.fm,h.rend_dbo,h.rend_nh4,h.rend_pt||0,h.sst,h.purga,`"${(h.nota||'').replace(/"/g,'""')}"`].join(','));
    const csv=[cab,...filas].join('\n');
    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='historico_reactor.csv'; a.click();
  }

  function GraficaReactor(){
    const valsRaw=hist.map(h=>h.tc);
    const vals=interpolarCeros(valsRaw);
    const histF=vals.filter(v=>v>0);
    if(histF.length<2) return(
      <div style={{textAlign:'center',padding:'16px 0',color:C.muted,fontSize:9}}>
        Guarda al menos 2 lecturas para ver la evolución
      </div>
    );
    const W=420,H=90,PL=36,PR=8,PT=8,PB=20,gW=W-PL-PR,gH=H-PT-PB;
    const minT=Math.min(...vals), maxT=Math.max(...vals), rngT=maxT-minT||1;
    const xIdxs=[0,Math.floor((vals.length-1)/2),vals.length-1];
    const ptsTc=vals.map((v,i)=>({
      x:PL+i/(vals.length-1)*gW,
      y:PT+gH-(v-minT)/rngT*gH,
      fecha:hist[i].fecha,
      interpolado:valsRaw[i]===0&&v!==0
    }));
    const polyTc=ptsTc.map(p=>`${p.x},${p.y}`).join(' ');
    const areaTc=[`${ptsTc[0].x},${PT+gH}`,...ptsTc.map(p=>`${p.x},${p.y}`),`${ptsTc[ptsTc.length-1].x},${PT+gH}`].join(' ');
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        <polygon points={areaTc} fill={C.warn} opacity="0.07"/>
        {[0,0.5,1].map((f,i)=>(
          <line key={i} x1={PL} y1={PT+gH*f} x2={W-PR} y2={PT+gH*f} stroke={C.border} strokeWidth="0.5" opacity="0.5"/>
        ))}
        <polyline points={polyTc} fill="none" stroke={C.warn} strokeWidth="1.5" strokeLinejoin="round"/>
        {ptsTc.map((p,i)=>(
          p.interpolado
            ? <circle key={i} cx={p.x} cy={p.y} r="3" fill="none" stroke={C.warn} strokeWidth="1.2" strokeDasharray="2,1" opacity="0.7"/>
            : <circle key={i} cx={p.x} cy={p.y} r="2.5" fill={C.warn} stroke={C.bg} strokeWidth="1"/>
        ))}
        {[minT,(minT+maxT)/2,maxT].map((v,i)=>(
          <text key={i} x={PL-3} y={PT+gH*(1-i*0.5)+3} textAnchor="end" fill={C.muted} fontSize="6" fontFamily="monospace">{v.toFixed(1)}</text>
        ))}
        {xIdxs.filter(i=>i<vals.length).map(i=>(
          <text key={i} x={PL+i/(vals.length-1)*gW} y={H-2} textAnchor="middle" fill={C.muted} fontSize="5.5" fontFamily="monospace">
            {hist[i].fecha}
          </text>
        ))}
        <text x={PL-3} y={PT-1} textAnchor="end" fill={C.muted} fontSize="5.5">d</text>
      </svg>
    );
  }

  return(
    <div style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 14px',marginTop:12}}>
      <div style={{fontSize:8,color:C.muted,textTransform:'uppercase',letterSpacing:2,marginBottom:10}}>▸ Histórico reactor</div>
      <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'flex-end',flexWrap:'wrap'}}>
        <div style={{display:'flex',flexDirection:'column',gap:2}}>
          <span style={{fontSize:7,color:C.muted,textTransform:'uppercase',letterSpacing:1}}>Fecha</span>
          <input type="date" value={fechaManual} onChange={e=>setFechaManual(e.target.value)}
            style={{background:C.bg,border:`1px solid ${C.inputBorder}`,borderRadius:5,
              padding:'4px 7px',fontSize:9,color:C.text,outline:'none',fontFamily:'monospace',
              colorScheme:'dark'}}/>
        </div>
        <input value={nota} onChange={e=>setNota(e.target.value)}
          placeholder="Nota opcional (turno, incidencia...)"
          style={{flex:1,minWidth:120,background:C.bg,border:`1px solid ${C.inputBorder}`,borderRadius:5,
            padding:'5px 8px',fontSize:9,color:C.text,outline:'none',fontFamily:'inherit'}}/>
        <button onClick={guardar}
          style={{background:C.green,border:'none',borderRadius:6,padding:'6px 14px',
            cursor:'pointer',fontSize:9,fontWeight:700,color:C.bg,whiteSpace:'nowrap'}}>
          ✚ Guardar
        </button>
        {hist.length>0&&(<>
          <button onClick={exportarCSV}
            style={{background:'none',border:`1px solid ${C.accent}50`,borderRadius:5,padding:'6px 10px',
              cursor:'pointer',fontSize:8,color:C.accent,whiteSpace:'nowrap'}}>
            ⬇ CSV
          </button>
          <button onClick={()=>generarInformePDF(p,res,'reactor',null,hist,null)}
            style={{background:'none',border:`1px solid ${C.accent}50`,borderRadius:5,padding:'6px 10px',
              cursor:'pointer',fontSize:8,color:C.accent,whiteSpace:'nowrap'}}>
            🖨 PDF
          </button>
          {confirmBorrar
            ? <div style={{display:'flex',gap:4}}>
                <button onClick={borrar} style={{background:C.danger,border:'none',borderRadius:4,padding:'4px 8px',cursor:'pointer',fontSize:8,fontWeight:700,color:'#fff',whiteSpace:'nowrap'}}>✓ Sí</button>
                <button onClick={()=>setConfirmBorrar(false)} style={{background:C.border,border:'none',borderRadius:4,padding:'4px 8px',cursor:'pointer',fontSize:8,color:C.text,whiteSpace:'nowrap'}}>✕ No</button>
              </div>
            : <button onClick={()=>setConfirmBorrar(true)}
                style={{background:'none',border:`1px solid ${C.border}`,borderRadius:5,padding:'6px 10px',
                  cursor:'pointer',fontSize:8,color:C.muted,whiteSpace:'nowrap'}}>
                🗑 Borrar
              </button>
          }
        </>)}
      </div>
      <div style={{fontSize:7,color:C.muted,marginBottom:8}}>{hist.length} registros · últimos {MAX} días</div>
      {hist.length>=2&&(
        <>
          <div style={{fontSize:7.5,color:C.warn,marginBottom:4}}>Edad de fango (días)</div>
          <GraficaReactor/>
        </>
      )}
      {hist.length>0&&(
        <div style={{marginTop:10,overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:8.5}}>
            <thead>

// ─── Interpolación de ceros ───────────────────────────────────────────────────
// Sustituye valores 0 por la interpolación lineal entera entre el anterior y siguiente no-cero
function interpolarCeros(arr){
  const out=arr.slice();
  for(let i=0;i<out.length;i++){
    if(out[i]===0){
      // buscar anterior no-cero
      let prev=null, iPrev=-1;
      for(let j=i-1;j>=0;j--){ if(out[j]!==0){prev=out[j];iPrev=j;break;} }
      // buscar siguiente no-cero
      let next=null, iNext=-1;
      for(let j=i+1;j<out.length;j++){ if(out[j]!==0){next=out[j];iNext=j;break;} }
      if(prev!==null&&next!==null){
        // interpolación lineal
        const t=(i-iPrev)/(iNext-iPrev);
        out[i]=Math.round(prev+(next-prev)*t);
      } else if(prev!==null){
        out[i]=Math.round(prev);
      } else if(next!==null){
        out[i]=Math.round(next);
      }
    }
  }
  return out;
}

// ─── Helpers gráfica SVG para PDF ────────────────────────────────────────────
function svgLineaPDF(hist, key, color, labelY, W=520, H=110){
  if(!hist||hist.length<2) return '<p style="color:#999;font-size:11px">Sin datos suficientes (mínimo 2 lecturas)</p>';
  const PL=44,PR=10,PT=10,PB=22,gW=W-PL-PR,gH=H-PT-PB;
  const valsRaw=hist.map(h=>h[key]);
  const vals=interpolarCeros(valsRaw);
  const minV=Math.min(...vals), maxV=Math.max(...vals), rng=maxV-minV||1;
  const pts=hist.map((h,i)=>({
    x:PL+i/(hist.length-1)*gW,
    y:PT+gH-(vals[i]-minV)/rng*gH,
    v:vals[i], f:h.fecha, interpolado:valsRaw[i]===0&&vals[i]!==0
  }));
  const poly=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=[`${pts[0].x.toFixed(1)},${(PT+gH).toFixed(1)}`,...pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`),`${pts[pts.length-1].x.toFixed(1)},${(PT+gH).toFixed(1)}`].join(' ');
  const yLabels=[minV,(minV+maxV)/2,maxV];
  const xIdxs=[0,Math.floor((hist.length-1)/2),hist.length-1].filter((v,i,a)=>a.indexOf(v)===i);
  let svgLines='', svgPts='', svgYL='', svgXL='', svgGrid='';
  [0,0.5,1].forEach(f=>{
    const y=(PT+gH*f).toFixed(1);
    svgGrid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#d0dce8" stroke-width="0.5"/>`;
  });
  yLabels.forEach((v,i)=>{
    const y=(PT+gH*(1-i*0.5)+3).toFixed(1);
    svgYL+=`<text x="${PL-4}" y="${y}" text-anchor="end" fill="#7a8fa8" font-size="7" font-family="monospace">${typeof v==='number'?v.toFixed(1):v}</text>`;
  });
  xIdxs.forEach(i=>{
    const x=(PL+i/(hist.length-1)*gW).toFixed(1);
    svgXL+=`<text x="${x}" y="${H-4}" text-anchor="middle" fill="#7a8fa8" font-size="6.5" font-family="monospace">${pts[i].f}</text>`;
  });
  pts.forEach(p=>{
    if(p.interpolado){
      svgPts+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="none" stroke="${color}" stroke-width="1.2" stroke-dasharray="2,1" opacity="0.7"/>`;
    } else {
      svgPts+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${color}" stroke="#fff" stroke-width="1"/>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    ${svgGrid}
    <polygon points="${area}" fill="${color}" opacity="0.08"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    ${svgPts}
    ${svgYL}
    ${svgXL}
    <text x="${PL-4}" y="${PT-1}" text-anchor="end" fill="#7a8fa8" font-size="6.5">${labelY}</text>
  </svg>`;
}

function svgLechoPDF(hist, W=520, H=110){
  if(!hist||hist.length<2) return '<p style="color:#999;font-size:11px">Sin datos suficientes (mínimo 2 lecturas)</p>';
  const PL=44,PR=10,PT=10,PB=22,gW=W-PL-PR,gH=H-PT-PB;
  const valsRaw=hist.map(h=>h.hlf);
  const vals=interpolarCeros(valsRaw);
  const minV=Math.min(...vals), maxV=Math.max(...vals), rng=maxV-minV||1;
  const pts=hist.map((h,i)=>({x:PL+i/(hist.length-1)*gW,y:PT+gH-(vals[i]-minV)/rng*gH,h,interpolado:valsRaw[i]===0&&vals[i]!==0}));
  const poly=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=[`${pts[0].x.toFixed(1)},${(PT+gH).toFixed(1)}`,...pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`),`${pts[pts.length-1].x.toFixed(1)},${(PT+gH).toFixed(1)}`].join(' ');
  const xIdxs=[0,Math.floor((hist.length-1)/2),hist.length-1].filter((v,i,a)=>a.indexOf(v)===i);
  let svgGrid='',svgPts='',svgYL='',svgXL='';
  [0,0.5,1].forEach(f=>{ svgGrid+=`<line x1="${PL}" y1="${(PT+gH*f).toFixed(1)}" x2="${W-PR}" y2="${(PT+gH*f).toFixed(1)}" stroke="#d0dce8" stroke-width="0.5"/>`; });
  [minV,(minV+maxV)/2,maxV].forEach((v,i)=>{ svgYL+=`<text x="${PL-4}" y="${(PT+gH*(1-i*0.5)+3).toFixed(1)}" text-anchor="end" fill="#7a8fa8" font-size="7" font-family="monospace">${v.toFixed(2)}</text>`; });
  xIdxs.forEach(i=>{ svgXL+=`<text x="${(PL+i/(hist.length-1)*gW).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="#7a8fa8" font-size="6.5" font-family="monospace">${pts[i].h.fecha}</text>`; });
  pts.forEach(p=>{ const col=p.h.pct>70?'#cc1122':p.h.pct>50?'#cc7700':'#008855'; if(p.interpolado){ svgPts+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="none" stroke="${col}" stroke-width="1.2" stroke-dasharray="2,1" opacity="0.7"/>`; } else { svgPts+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${col}" stroke="#fff" stroke-width="1"/>`; } });
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    ${svgGrid}
    <polygon points="${area}" fill="#ff8c42" opacity="0.08"/>
    <polyline points="${poly}" fill="none" stroke="#ff8c42" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    ${svgPts}
    ${svgYL}${svgXL}
    <text x="${PL-4}" y="${PT-1}" text-anchor="end" fill="#7a8fa8" font-size="6.5">m</text>
  </svg>`;
}

    if(serial instanceof Date) return serial;

    return dd.toISOString().slice(0,10);
  }

  function handleExcelLoad(e){
    const file=e.target.files[0];
    if(!file){return;}
    setXlsxMsg('Cargando...');
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        // El Excel tiene 5 filas de cabecera:
        // F1=Título, F2=Instrucción, F3=Grupos, F4=Cabeceras reales, F5=Aviso
        // F6+ = datos. Usamos range:3 → fila 4 (0-indexed) = cabeceras reales.
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rowsRaw=XLSX.utils.sheet_to_json(ws,{raw:true, defval:null, range:3});
        const rowsFmt=XLSX.utils.sheet_to_json(ws,{raw:false,dateNF:'yyyy-mm-dd',defval:'',range:3});

        // Convierte cualquier valor a ISO yyyy-mm-dd
        function parsearFecha(rawVal, fmtVal){
          if(rawVal instanceof Date){
            const y=rawVal.getFullYear(), mo=String(rawVal.getMonth()+1).padStart(2,'0'), d=String(rawVal.getDate()).padStart(2,'0');
            return `${y}-${mo}-${d}`;
          }
          const n=Number(rawVal);
          if(!isNaN(n)&&n>40000&&n<60000){
            const dt=new Date(Math.round((n-25569)*86400*1000));
            return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,'0')}-${String(dt.getUTCDate()).padStart(2,'0')}`;
          }
          const s=String(fmtVal||rawVal||'').trim();
          if(!s) return '';
          if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
          const m1=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
          if(m1) return `${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
          const m2=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
          if(m2) return `${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
          return '';
        }

        const sampleKeys=rowsRaw.length>0?Object.keys(rowsRaw[0]):[];
        const fechaKey=sampleKeys.find(k=>/^fecha$/i.test(k.trim()))
                    || sampleKeys.find(k=>/fecha|date|d[ií]a|jornada/i.test(k));

        // Normalizar claves: quitar \r\n y texto de unidades
        function normalizarClave(k){
          return k.split(/[\r\n]/)[0].replace(/\s*[\(\[].*$/,'').trim();
        }

        const parsed=rowsRaw.map((r,i)=>{
          const fk=fechaKey||Object.keys(r)[0];
          const fechaISO=fk?parsearFecha(r[fk],rowsFmt[i]?.[fk]):'';
          // Reconstruir fila con claves normalizadas
          const normalized={_fechaISO:fechaISO};
          Object.keys(r).forEach(k=>{
            normalized[normalizarClave(k)]=r[k];
          });
          return normalized;
        }).filter(r=>r._fechaISO);
        setExcelData(parsed);
        setXlsxMsg(`✓ ${parsed.length} registros cargados`);
        // Si sólo hay una fila, seleccionarla automáticamente
        if(parsed.length===1) applyRow(parsed[0]);
      }catch(err){
        setXlsxMsg('⚠ Error al leer el Excel: '+err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // Mapeo columnas Excel → campos app
  // SS REACTOR y SS RECIRCULACIÓN están en g/L en el Excel → ×1000 para mg/L
  function applyRow(row){
    const rowKeys=Object.keys(row);
    // Búsqueda robusta: exacto → parcial (ignora mayús/acento/unidades)
    const n=(search,mult=1)=>{
      // 1. Exacto
      let v=parseFloat(row[search]);
      if(!isNaN(v)) return v*mult;
      // 2. Clave que empieza por search (ignora mayúsculas)
      const sl=search.toLowerCase();
      const fk=rowKeys.find(k=>k.trim().toLowerCase().startsWith(sl))
            ||rowKeys.find(k=>k.trim().toLowerCase().includes(sl));
      if(fk){ v=parseFloat(row[fk]); if(!isNaN(v)) return v*mult; }
      return undefined;
    };
    const updates={};
    const caudal=n('Caudal entrada Biologico');        if(caudal!==undefined)   updates.caudal=caudal;
    const dbo_e=n('DBO5 ENTRADA');                    if(dbo_e!==undefined)    updates.dbo_entrada=dbo_e;
    const dqo_e=n('DQO ENTRADA');                     if(dqo_e!==undefined)    updates.dqo_entrada=dqo_e;
    const nh4_e=n('NT ENTRADA');                      if(nh4_e!==undefined)    updates.nh4_entrada=nh4_e;
    // SS REACTOR en g/L → mg/L
    const sst_r=n('SS REACTOR',1000);                 if(sst_r!==undefined)    updates.sst_reactor=sst_r;
    const sst_rc=n('SS RECIRCULACIÓN',1000);           if(sst_rc!==undefined)   updates.sst_recirculacion=sst_rc;
    const sst_ef=n('SS EFLUENTE');                    if(sst_ef!==undefined)   updates.sst_efluente=sst_ef;
    const qpurga=n('CAUDAL PURGA');                   if(qpurga!==undefined)   updates.caudal_purga_d=qpurga;
    const qrecirc=n('CAUDAL RECIRCULACIÓN');           if(qrecirc!==undefined)  updates.caudal_recirculacion=qrecirc;
    const dbo_ef=n('DBO EFLUENTE');                   if(dbo_ef!==undefined)   updates.dbo_efluente=dbo_ef;
    const dqo_ef=n('DQO EFLUENTE');                   if(dqo_ef!==undefined)   updates.dqo_efluente=dqo_ef;
    const nh4_ef=n('NT FLUENTE');                     if(nh4_ef!==undefined)   updates.nh4_efluente=nh4_ef;
    const pt_e=n('PT ENTRADA');                       if(pt_e!==undefined)     updates.pt_entrada=pt_e;
    const pt_ef=n('PT EFLUENTE');                     if(pt_ef!==undefined)    updates.pt_efluente=pt_ef;
    setP(prev=>({...prev,...updates}));
  }

  function handleRangeLoad(ini,fin){
    if(!ini||!fin){setXlsxMsg('⚠ Selecciona inicio y fin');return;}
    if(ini>fin){setXlsxMsg('⚠ Inicio debe ser anterior al fin');return;}
    if(!excelData.length){setWeekSummary(null);return;}
    const days=excelData
      .filter(r=>r._fechaISO>=ini&&r._fechaISO<=fin)
      .map(r=>({iso:r._fechaISO,row:r}));
    const startISO=ini;
    if(!days.length){setXlsxMsg('\u26a0 Sin datos en ese rango');setWeekSummary(null);return;}
    // Promediar todos los campos numéricos
    const sampleKeys=Object.keys(days[0].row).filter(k=>k!=='_fechaISO');
    const avg={_fechaISO:startISO};
    sampleKeys.forEach(k=>{
      const vals=days.map(d=>d.row[k]).filter(v=>typeof v==='number'&&v!==0&&!isNaN(v));
      avg[k]=vals.length?Math.round((vals.reduce((s,v)=>s+v,0)/vals.length)*100)/100:0;
    });
    setWeekSummary({days,avg,startISO:ini,endISO:fin});
    applyRow(avg);

    // Calcular resultados individuales por día para gráficas
    const calc=days.map(d=>{
      // Construir params del día usando el mapping de applyRow
      const rkeys=Object.keys(d.row);
      const nv=(search,mult=1)=>{
        const sl=search.toLowerCase();
        const fk=rkeys.find(k=>k.trim().toLowerCase().startsWith(sl))||rkeys.find(k=>k.trim().toLowerCase().includes(sl));
        const v=parseFloat(fk?d.row[fk]:undefined);
        return isNaN(v)?0:v*mult;
      };
      const dp={
        ...p,
        caudal:           nv('Caudal entrada Biologico') || p.caudal,
        dbo_entrada:      nv('DBO5 ENTRADA')             || p.dbo_entrada,
        dqo_entrada:      nv('DQO ENTRADA')              || p.dqo_entrada,
        nh4_entrada:      nv('NT ENTRADA')               || p.nh4_entrada,
        sst_reactor:      nv('SS REACTOR',1000)          || p.sst_reactor,
        sst_recirculacion:nv('SS RECIRULACI',1000)       || p.sst_recirculacion,
        sst_efluente:     nv('SS EFLUENTE')              || p.sst_efluente,
        caudal_purga_d:   nv('CAUDAL PURGA')             || p.caudal_purga_d,
        caudal_recirculacion:nv('CAUDAL RECIR')          || p.caudal_recirculacion,
        dbo_efluente:     nv('DBO EFLUENTE')             || p.dbo_efluente,
        dqo_efluente:     nv('DQO EFLUENTE')             || p.dqo_efluente,
        nh4_efluente:     nv('NT FLUENTE')               || p.nh4_efluente,
        pt_entrada:       nv('PT ENTRADA')               || p.pt_entrada,
        pt_efluente:      nv('PT EFLUENTE')              || p.pt_efluente,
      };
      const dr=calcular(dp);
      return {
        iso:d.iso,
        tc:Number(dr.tc.toFixed(1)),
        rend_dqo:Number(dr.rend_dqo.toFixed(1)),
        rend_dbo:Number(dr.rend_dbo.toFixed(1)),
        rend_nh4:Number(dr.rend_nh4.toFixed(1)),
        rend_pt:Number(dr.rend_pt.toFixed(1)),
        fecha:d.iso.slice(5), // MM-DD
      };
    });
    setWeekCalc(calc);
    // Notificar al portal con datos de la semana
    try{
      window.parent.postMessage({type:'sim-week', days:calc, start:startISO}, '*');
      localStorage.setItem('sgi-tendencias-semana', JSON.stringify({days:calc, start:startISO, ts:Date.now()}));
    }catch(e){}
    // Enviar KPIs del ÚLTIMO DÍA directamente (no el promedio)
    if(calc.length){
      const lastDay=calc[calc.length-1];
      const lastRow=days[days.length-1].row;
      const sstLast=parseFloat(lastRow['SS REACTOR']||0);
      try{
        window.parent.postMessage({
          type:'sim-kpi',
          edad:String(lastDay.tc),
          sst: sstLast?Math.round(sstLast*1000):undefined,
          dqo: String(lastDay.rend_dqo)
        }, '*');
      }catch(e){}
    }
    setXlsxMsg('\u2713 '+days.length+' d\u00eda'+(days.length>1?'s':'')+' ('+ini+' \u2192 '+fin+')');
  }

  function exportWeekPDF(){
    if(!weekSummary) return;
    const {days,startISO,endISO}=weekSummary;
    const calc=weekCalc.length?weekCalc:days.map(d=>({iso:d.iso,tc:0,rend_dqo:0,rend_dbo:0,rend_nh4:0,rend_pt:0,fecha:d.iso.slice(5)}));
    const dateStr=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});

    // ── SVG chart helper ──────────────────────────────────────────────────────
    function svgLine(data, key, color, label, refV, unit){
      const vals=data.map(d=>Number(d[key])||0);
      const W=Math.max(480,data.length*38),H=110,PL=42,PR=10,PT=10,PB=22,gW=W-PL-PR,gH=H-PT-PB;
      const minV=Math.max(0,Math.min(...vals)*0.85), maxV=Math.max(...vals)*1.1||1, rng=maxV-minV||1;
      const pts=data.map((d,i)=>({x:PL+i/(data.length-1||1)*gW, y:PT+gH-(vals[i]-minV)/rng*gH, v:vals[i]}));
      const poly=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const area=[`${pts[0].x.toFixed(1)},${PT+gH}`,...pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`),`${pts[pts.length-1].x.toFixed(1)},${PT+gH}`].join(' ');
      const refY=PT+gH-(refV-minV)/rng*gH;
      let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg+=`<polygon points="${area}" fill="${color}" opacity="0.1"/>`;
      if(refV>minV&&refV<maxV) svg+=`<line x1="${PL}" y1="${refY.toFixed(1)}" x2="${W-PR}" y2="${refY.toFixed(1)}" stroke="${color}" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>`;
      [0,0.5,1].forEach(f=>{ svg+=`<line x1="${PL}" y1="${(PT+gH*f).toFixed(1)}" x2="${W-PR}" y2="${(PT+gH*f).toFixed(1)}" stroke="#d0dce8" stroke-width="0.5"/>`; });
      svg+=`<polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
      pts.forEach((p,i)=>{ svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.2"/><text x="${p.x.toFixed(1)}" y="${(p.y-6).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="7" font-family="Arial" font-weight="700">${p.v.toFixed(1)}</text>`; });
      [minV,(minV+maxV)/2,maxV].forEach((v,i)=>{ svg+=`<text x="${PL-4}" y="${(PT+gH*(1-i*0.5)+3).toFixed(1)}" text-anchor="end" fill="#7a8fa8" font-size="7" font-family="monospace">${v.toFixed(1)}</text>`; });
      data.forEach((d,i)=>{ const p=pts[i]; svg+=`<text x="${p.x.toFixed(1)}" y="${H-4}" text-anchor="middle" fill="#7a8fa8" font-size="6.5" font-family="monospace">${d.fecha||d.iso.slice(5)||''}</text>`; });
      svg+=`<text x="${PL-4}" y="${PT-2}" text-anchor="end" fill="#7a8fa8" font-size="6">${unit}</text>`;
      svg+=`</svg>`;
      return svg;
    }

    // ── Tabla datos crudos ────────────────────────────────────────────────────

  // Fechas disponibles para el selector
  const fechasDisponibles=excelData.map(r=>r._fechaISO);
  const [tab,setTab]=useState('proceso');
  const [mainTab,setMainTab]=useState('reactor');
  const [fs,setFs]=useState(false);
  const toggleFs=()=>{
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
      setFs(true);
    } else {
      document.exitFullscreen&&document.exitFullscreen();
      setFs(false);
    }
  };
  useEffect(()=>{
    const h=()=>setFs(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange',h);
    return()=>document.removeEventListener('fullscreenchange',h);
  },[]);
  const [mob,setMob]=useState(window.innerWidth<700);
  useEffect(()=>{const f=()=>setMob(window.innerWidth<700);window.addEventListener('resize',f);return()=>window.removeEventListener('resize',f);},[]);

  const set=useCallback(k=>v=>setP(prev=>({...prev,[k]:v})),[]);
  const res=calcular(p);

  // Enviar KPIs al portal padre cada vez que cambian los resultados
  useEffect(()=>{
    // Enviar KPIs al portal cada vez que cambian los parámetros
    try{
      window.parent.postMessage({
        type:'sim-kpi',
        edad:res.tc.toFixed(1),
        sst: p.sst_reactor,
        dqo: res.rend_dqo.toFixed(1)
      }, '*');
    }catch(_){}
  },[p]);
  const acumCol=Math.abs(res.acum)<20?C.green:res.acum>0?C.warn:C.danger;
  const diff=p.caudal_purga_d-res.Qw_nec, pOk=Math.abs(diff)<5;

  const sc=`background:${C.bg};color:${C.text}`;

  function PP({compact=true}){return(<>
    <Slider label={t.caudalBio}     unit="m³/d" min={200} max={2000} step={10}  value={p.caudal}        onChange={set('caudal')}        color={C.accent} C={C} compact={compact}/>
    <Slider label={t.od}            unit="mg/L"  min={0.3} max={6}   step={0.1} value={p.od}            onChange={set('od')}            color={C.green}  C={C} compact={compact}/>
    <Slider label={t.recirculacion} unit="%"     min={20}  max={150} step={5}   value={p.recirculacion} onChange={set('recirculacion')} color={C.warn}   C={C} compact={compact}/>
    <div style={{display:'flex',alignItems:'center',gap:4,opacity:0.75}}><span style={{fontSize:9,color:C.muted,fontFamily:'monospace',whiteSpace:'nowrap'}}>{t.volReactor}:</span><span style={{fontSize:10,color:C.text,fontFamily:'monospace',fontWeight:700}}>2 167,90 m³</span><span style={{fontSize:8,color:C.muted,fontFamily:'monospace'}}>(fijo)</span></div>
    <NumInput label={t.edadObjetivo} unit="días"  value={p.edad_objetivo} onChange={set('edad_objetivo')} color={C.text}   C={C} compact={compact}/>
  </>);}
  function PLE({compact=true}){return(<>
    <NumInput label={t.dboEntrada} unit="mg/L" value={p.dbo_entrada} onChange={set('dbo_entrada')} color={C.accent} C={C} compact={compact}/>
    <NumInput label={t.dqoEntrada} unit="mg/L" value={p.dqo_entrada} onChange={set('dqo_entrada')} color={C.accent} C={C} compact={compact}/>
    <NumInput label={t.nh4Entrada} unit="mg/L" value={p.nh4_entrada} onChange={set('nh4_entrada')} color={C.accent} C={C} compact={compact}/>
    <NumInput label={t.pt_entrada} unit="mg/L" value={p.pt_entrada} onChange={set('pt_entrada')} color={C.accent} C={C} compact={compact}/>
  </>);}
  function PLR({compact=true}){return(<>
    <NumInput label={t.sstReactor}  unit="mg/L" value={p.sst_reactor}         onChange={set('sst_reactor')}         color={C.purple} C={C} compact={compact}/>
    <NumInput label={t.sstRecirc}   unit="mg/L" value={p.sst_recirculacion}    onChange={set('sst_recirculacion')}   color={C.warn}   C={C} compact={compact}/>
    <NumInput label={t.sstEfluente} unit="mg/L" value={p.sst_efluente}         onChange={set('sst_efluente')}        color={C.purple} C={C} compact={compact}/>

    <NumInput label={t.caudalRecirc} unit="m³/d" value={p.caudal_recirculacion} onChange={set('caudal_recirculacion')} color={C.warn} C={C} compact={compact}/>

      </span>
    </div>
  </>);}

        border:`1px solid ${excelData.length?C.green+'60':C.border}`,
        borderRadius:7,padding:'4px 10px',gap:8}}>
        <input ref={fileInputRef} type="file" accept=".xlsx,.xls"
          style={{display:'none'}} onChange={handleExcelLoad}/>
        <button onClick={()=>fileInputRef.current&&fileInputRef.current.click()}
          style={{padding:'3px 10px',border:`1px solid ${C.accent}`,borderRadius:5,
            background:C.accent+'18',color:C.accent,fontSize:9,fontWeight:700,cursor:'pointer',
            whiteSpace:'nowrap'}}>
          📂 Cargar Excel
        </button>
        {excelData.length>0&&(
          <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
            <span style={{fontSize:8,color:C.muted,whiteSpace:'nowrap'}}>Desde:</span>
            <input type='date' value={fechaIni} onChange={e=>setFechaIni(e.target.value)}
              list='sim-ext-fechas'
              style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,
                color:C.accent,fontSize:9,fontFamily:'monospace',padding:'2px 6px',
                outline:'none',colorScheme:'dark',width:116}}/>
            <span style={{fontSize:8,color:C.muted,whiteSpace:'nowrap'}}>Hasta:</span>
            <input type='date' value={fechaFin} onChange={e=>setFechaFin(e.target.value)}
              list='sim-ext-fechas'
              style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,
                color:C.accent,fontSize:9,fontFamily:'monospace',padding:'2px 6px',
                outline:'none',colorScheme:'dark',width:116}}/>
            <datalist id='sim-ext-fechas'>
              {fechasDisponibles.map(f=>(<option key={f} value={f}/>))}
            </datalist>
            <button onClick={()=>handleRangeLoad(fechaIni,fechaFin)}
              style={{padding:'3px 10px',background:C.accent,border:'none',borderRadius:4,
                color:C.bg,fontSize:9,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
              Cargar
            </button>
            {weekSummary&&(
              <button onClick={exportWeekPDF}
                style={{padding:'3px 8px',background:'rgba(185,28,28,.8)',border:'none',borderRadius:5,
                  color:'white',fontSize:9,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
                📄 Informe período
              </button>
            )}
          </div>
        )}
        {xlsxMsg&&(
          <span style={{fontSize:8,color:xlsxMsg.startsWith('✓')?C.green:xlsxMsg.startsWith('⚠')?C.warn:C.muted,
            whiteSpace:'nowrap',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}}>
            {xlsxMsg}
          </span>
        )}
      </div>

      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
        <div style={{display:'flex',gap:1,background:C.inputBg,borderRadius:5,padding:2}}>
          {['es','en'].map(l=>(
            <button key={l} onClick={()=>setLang(l)}
              style={{padding:'3px 8px',border:'none',borderRadius:4,cursor:'pointer',fontSize:9,fontWeight:700,
                background:lang===l?C.accent:'transparent',color:lang===l?C.bg:C.muted,transition:'all .15s'}}>
              {l.toUpperCase()}
            </button>
          ))}
        </div>
        <button onClick={()=>setDark(d=>!d)}
          style={{padding:'3px 10px',border:`1px solid ${C.border}`,borderRadius:5,
            background:'transparent',color:C.muted,fontSize:10,cursor:'pointer'}}>
          {dark?'☀ Light':'🌙 Dark'}
        </button>
        <button onClick={toggleFs}
          title={fs?'Salir de pantalla completa':'Pantalla completa'}
          style={{padding:'3px 10px',border:`1px solid ${fs?C.accent:C.border}`,borderRadius:5,
            background:fs?C.accent+'22':'transparent',color:fs?C.accent:C.muted,
            fontSize:13,cursor:'pointer',lineHeight:1}}>
          {fs?'⊡':'⊞'}
        </button>
      </div>
    </div>
  );

  const tabs=[{id:'proceso',lbl:t.tabProceso},{id:'lab_ent',lbl:t.tabEntrada},{id:'lab_reac',lbl:t.tabReactor},{id:'lab_ef',lbl:t.tabEfluente}];
  const gauges=[{l:'DBO₅',v:res.dbo_ef,lm:res.limites.dbo},{l:'DQO',v:res.dqo_ef,lm:res.limites.dqo},{l:'SS',v:res.ss_ef,lm:res.limites.ss},{l:'Nt',v:res.nh4_ef,lm:res.limites.nh4},{l:'Pt',v:res.pt_ef,lm:res.limites.pt}];

  if(mob) return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:"'IBM Plex Sans',sans-serif",paddingBottom:24}}>
      <Topbar/>
      <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px',overflowX:'auto'}}>
          <div style={{minWidth:600}}><Diagrama p={p} res={res} t={t} C={C} onGoDec={()=>setMainTab('decantador')}/></div>
        </div>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 12px'}}>
          <PanelInd res={res} p={p} t={t} C={C}/>
        </div>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
          <div style={{display:'flex',borderBottom:`1px solid ${C.border}`}}>
            {tabs.map(tb=>(<button key={tb.id} onClick={()=>setTab(tb.id)}
              style={{flex:1,padding:'7px 2px',background:tab===tb.id?C.inputBg:'transparent',
                border:'none',color:tab===tb.id?C.accent:C.muted,fontSize:8,fontWeight:700,cursor:'pointer',
                borderBottom:tab===tb.id?`2px solid ${C.accent}`:'2px solid transparent'}}>
              {tb.lbl}
            </button>))}
          </div>
          <div style={{padding:'10px 12px'}}>
            {tab==='proceso'&&<PP/>}
            {tab==='lab_ent'&&<PLE/>}
            {tab==='lab_reac'&&<PLR/>}
            {tab==='lab_ef'&&<PLEf/>}
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {gauges.map(g=>(<Gauge key={g.l} label={g.l} value={g.v} limite={g.lm} unit="mg/L" C={C} compact/>))}
        </div>
        <PanelFormulas p={p} res={res} t={t} C={C}/>
        <div style={{fontSize:7.5,color:C.muted,textAlign:'center',opacity:0.65}}>{t.footer} · {t.autor}</div>
      </div>
    </div>
  );

  return(
    <div style={{height:'100vh',background:C.bg,color:C.text,fontFamily:"'IBM Plex Sans',sans-serif",display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <Topbar/>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {mainTab==='decantador'?(
          <div style={{flex:1,padding:'12px 14px',overflow:'hidden'}}>
            <PanelDecantador p={p} C={C} t={t} set={set}/>
          </div>
        ):(
        <React.Fragment>
        {/* Col 1 */}
        <div style={{width:215,borderRight:`1px solid ${C.border}`,overflowY:'auto',padding:'10px 11px',flexShrink:0}}>
          <SecHdr label={t.proceso}         color={C.accent} C={C}/>     <PP/>
          <SecHdr label={t.labEntrada}      color={C.accent} C={C} mt/> <PLE/>
          <SecHdr label={t.labReactor}      color={C.purple} C={C} mt/> <PLR/>
          <SecHdr label={t.labEfluente}     color={C.green}  C={C} mt/> <PLEf/>
          <SecHdr label={t.calidadEfluente} color={C.green}  C={C} mt/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:4}}>
            {gauges.map(g=>(<Gauge key={g.l} label={g.l} value={g.v} limite={g.lm} unit="mg/L" C={C} compact/>))}
          </div>
          {res.alertas.length>0&&(
            <div style={{background:'#120508',border:`1px solid ${C.danger}40`,borderRadius:6,padding:'6px 9px',marginTop:4}}>
              <div style={{fontSize:8,color:C.danger,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>⚠ {t.incumplimientos}</div>
              {res.alertas.map(a=>(<div key={a.param} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:`1px solid ${C.danger}15`}}>
                <span style={{fontSize:10,fontWeight:700,color:C.danger,fontFamily:'monospace'}}>{a.param}</span>
                <span style={{fontSize:9,color:C.muted}}>{a.valor} &gt; {a.limite}</span>
              </div>))}
            </div>
          )}
        </div>
        {/* Col 2 */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRight:`1px solid ${C.border}`}}>
          <div style={{padding:'8px 12px',borderBottom:`1px solid ${C.border}`,flexShrink:0,overflowX:'auto'}}>
            <div style={{fontSize:8,color:C.muted,textTransform:'uppercase',letterSpacing:2,marginBottom:4}}>▸ {t.diagramaProceso}</div>
            <div style={{minWidth:780}}><Diagrama p={p} res={res} t={t} C={C} onGoDec={()=>setMainTab('decantador')}/></div>
          </div>

          <PanelHistoricoReactor p={p} res={res} C={C} t={t}/>
          <div style={{padding:'3px 12px',borderTop:`1px solid ${C.border}`,fontSize:7.5,color:C.muted,textAlign:'center',opacity:0.65,marginTop:8}}>
            {t.footer} · {t.autor}
          </div>
        </div>
        {/* Col 3 */}
        <div style={{width:260,overflowY:'auto',padding:'10px 11px'}}>
          <PanelInd res={res} p={p} t={t} C={C}/>
          <div style={{marginTop:14}}>
            <div style={{fontSize:8,color:C.muted,textTransform:'uppercase',letterSpacing:2,marginBottom:8}}>▸ {t.eficiencias}</div>
            {[{l:'DBO₅',v:res.rend_dbo},{l:'DQO',v:res.rend_dqo},{l:'Nt',v:res.rend_nh4},{l:'Pt',v:res.rend_pt}].map(e=>(
              <div key={e.l} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:10,color:C.muted,fontWeight:600}}>{e.l}</span>
                  <span style={{fontSize:13,fontWeight:800,fontFamily:'monospace',color:e.v>85?C.green:e.v>70?C.warn:C.danger}}>{e.v.toFixed(1)}%</span>
                </div>
                <div style={{height:7,background:C.border,borderRadius:4}}>
                  <div style={{height:'100%',width:`${Math.min(e.v,100)}%`,background:e.v>85?C.green:e.v>70?C.warn:C.danger,borderRadius:4,transition:'width .4s'}}/>
                </div>
                <div style={{fontSize:7,color:C.muted,marginTop:2}}>{e.v>85?'✓ Óptimo':e.v>70?'⚠ Mejorable':'✗ Bajo'}</div>
              </div>
            ))}
          </div>
          <SecHdr label={t.balanceMasa} color={C.green} C={C} mt/>
          {[{lbl:t.masaReactor,v:res.M,u:'kgSS',col:C.text,ar:null},
            {lbl:t.produccionPx,v:res.Px,u:'kgSS/d',col:C.green,ar:'+'},
            {lbl:t.salidaPurga,v:res.FQwXw,u:'kgSS/d',col:C.orange,ar:'−'},
            {lbl:t.salidaEfluente,v:res.FQeXe,u:'kgSS/d',col:C.muted,ar:'−'}].map(r=>(
            <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${C.border}22`}}>
              <span style={{fontSize:9,color:C.muted}}>{r.ar&&<span style={{color:r.col,marginRight:3}}>{r.ar}</span>}{r.lbl}</span>
              <span style={{fontFamily:'monospace',fontWeight:700,fontSize:10,color:r.col}}>
                {r.v.toFixed(1)}<span style={{fontSize:7,color:C.muted,marginLeft:1}}>{r.u}</span>
              </span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5,paddingTop:5,borderTop:`1px solid ${C.border}`}}>
            <span style={{fontSize:9,fontWeight:700,color:C.text}}>{t.acumulacionNeta}</span>
            <span style={{fontFamily:'monospace',fontWeight:700,fontSize:11,color:acumCol}}>
              {res.acum>0?'+':''}{res.acum.toFixed(1)}<span style={{fontSize:7,color:C.muted,marginLeft:1}}>kgSS/d</span>
            </span>
          </div>
          {Math.abs(res.acum)>30&&(
            <div style={{fontSize:8,color:acumCol,marginTop:4,background:C.inputBg,borderRadius:4,padding:'4px 7px'}}>
              {res.acum>0?t.aumentaPurga:t.reducePurga}
            </div>
          )}
          <SecHdr label={t.verificacionPurga} color={C.orange} C={C} mt/>
          <div style={{background:C.inputBg,border:`1px solid ${pOk?C.green+'40':C.danger+'40'}`,borderRadius:7,padding:'9px 11px'}}>
            <div style={{display:'flex',gap:6,marginBottom:7}}>
              <div style={{flex:1}}>
                <div style={{fontSize:7.5,color:C.muted,marginBottom:1}}>{t.actual}</div>
                <div style={{fontSize:16,fontWeight:800,fontFamily:'monospace',color:C.orange}}>
                  {p.caudal_purga_d}<span style={{fontSize:7,color:C.muted}}> m³/d</span>
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:7.5,color:C.muted,marginBottom:1}}>{t.necesaria}</div>
                <div style={{fontSize:16,fontWeight:800,fontFamily:'monospace',color:pOk?C.green:C.danger}}>
                  {res.Qw_nec.toFixed(0)}<span style={{fontSize:7,color:C.muted}}> m³/d</span>
                </div>
              </div>
            </div>
            <div style={{height:1,background:C.border,marginBottom:7}}/>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:8,color:C.muted}}>{t.desviacion}</span>
              <span style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:pOk?C.green:Math.abs(diff)<10?C.warn:C.danger}}>
                {diff>0?'+':''}{diff.toFixed(0)} m³/d
              </span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
              <span style={{fontSize:8,color:C.muted}}>{t.equipSS}</span>
              <span style={{fontFamily:'monospace',fontWeight:700,fontSize:10,color:pOk?C.green:C.warn}}>
                {(diff*p.sst_recirculacion/1000).toFixed(0)} kgSS/d
              </span>
            </div>
          </div>
          <div style={{marginTop:12}}>
            <PanelFormulas p={p} res={res} t={t} C={C}/>
          </div>

        </div>
      </React.Fragment>
      )}
      </div>
    </div>
  );
}


const _rootEl = document.getElementById('sim-proceso-root') || document.getElementById('app-root');
ReactDOM.createRoot(_rootEl).render(<App/>);


</script>
<!-- Babel loaded LAST so the DOM (including sim-jsx-src) is ready -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script>
// Manual compilation — guaranteed to run after DOM is ready
(function() {
  var src = document.getElementById('sim-jsx-src').textContent;
  try {
    var compiled = Babel.transform(src, { presets: ['react'] }).code;
    var el = document.getElementById('app-root');
    var loading = document.getElementById('sim-loading');
    el.style.display = 'block';
    if(loading) loading.style.display = 'none';
    eval(compiled);
  } catch(err) {
    document.getElementById('sim-loading').innerHTML =
      '<div style="color:#ff4455;padding:2rem;font-family:monospace;font-size:.82rem;max-width:600px;">' +
      '<strong>Error al compilar el simulador:</strong><br><br>' +
      err.message.replace(/</g,'&lt;').replace(/>/g,'&gt;') +
      '</div>';
  }
})();
</script>
</body>
</html>
