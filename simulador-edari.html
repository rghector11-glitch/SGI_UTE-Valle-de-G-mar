<!DOCTYPE html>
<html lang="es">
<head>
<script>
  // Auth guard — checks local session
  (function() {
    try {
      const s = JSON.parse(localStorage.getItem('ute-session'));
      if(!s || !s.username) { window.location.href = 'index.html'; }
    } catch(e) { window.location.href = 'index.html'; }
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simulador Proceso EDARi — UTE Valle de Güímar</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1f1a;--bg2:#122319;--bg3:#0a1a14;--card:#152b20;--card2:#1a3328;--border:#2a4d38;--border2:#1e3d2c;--green:#2ecc71;--green2:#27ae60;--green3:#1e8449;--teal:#1abc9c;--yellow:#f39c12;--red:#e74c3c;--blue:#3498db;--text:#e8f5ec;--text2:#a8c9b0;--text3:#6a9878;--accent:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:var(--bg3);color:var(--text)}

/* ── LAYOUT SHELL ── */
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.scrollable{flex:1;overflow-y:auto;overflow-x:hidden}

/* ── HOME ── */
.home-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--accent);letter-spacing:.05em}
.home-org{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--text);text-align:right;line-height:1.3}
.home-org span{font-size:10px;color:var(--text3);font-weight:400;display:block}
.home-org em{font-size:9px;color:var(--text3);opacity:.45;font-family:'Barlow',sans-serif;font-weight:300;letter-spacing:.03em;font-style:normal;display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;padding:12px}
.pc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s}
.pc:hover{border-color:var(--green2)}
.pc-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:6px}
.pc-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--text);line-height:1.2;margin-bottom:3px}
.pc-desc{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:10px}
.pc-meta{display:flex;gap:10px;font-size:10px;color:var(--text3)}

/* ── PROC HEADER ── */
.proc-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.breadcrumb{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.breadcrumb span{color:var(--accent)}
.org-r{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--text);text-align:right;line-height:1.2}
.org-r small{font-size:9px;color:var(--text3);font-family:'Barlow',sans-serif;font-weight:400;display:block}
.org-r em{font-size:8px;color:var(--text3);opacity:.4;font-style:normal;display:block;letter-spacing:.03em}
.proc-title-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.proc-h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--text);line-height:1}
.proc-h1 small{font-size:14px;font-weight:400;color:var(--text2)}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:12px;border:1px solid}
.badge.green{background:#1a3d2a;border-color:#2ecc71;color:#2ecc71}
.badge.teal{background:#0d2d28;border-color:#1abc9c;color:#1abc9c}
.badge.blue{background:#0d1f35;border-color:#3498db;color:#3498db}
.badge.yellow{background:#2d2000;border-color:#f39c12;color:#f39c12}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:7px 16px;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab.active{color:var(--accent);border-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── DASHBOARD GRID ── */
.dash{padding:10px;display:grid;gap:8px}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:1fr 1fr 1fr}
.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.r13{grid-template-columns:1fr 3fr}
.r31{grid-template-columns:3fr 1fr}
.r21{grid-template-columns:2fr 1fr}

/* ── CARDS ── */
.dc{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.dc-h{background:var(--card2);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;align-items:center;justify-content:space-between}
.dc-ht{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.step-badge{font-size:8px;font-weight:700;letter-spacing:.05em;background:var(--green3);color:var(--accent);padding:2px 6px;border-radius:3px}
.dc-b{padding:8px 10px}

/* ── CONTENT ELEMENTS ── */
.lbl{font-size:9px;font-weight:700;color:var(--green);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.txt{font-size:11px;color:var(--text);line-height:1.5;margin-bottom:6px}
.txt:last-child{margin-bottom:0}
.mat-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.mat-list li{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:5px;padding:1px 0}
.mat-dot{width:5px;height:5px;border-radius:50%;background:var(--green2);flex-shrink:0}
.dash-table{width:100%;border-collapse:collapse;font-size:10px}
.dash-table th{background:var(--bg);color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)}
.dash-table td{padding:5px 8px;border-bottom:1px solid var(--border2);color:var(--text)}
.dash-table tr:last-child td{border-bottom:none}
.dash-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.vol-badge{display:inline-block;background:var(--green3);color:var(--accent);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px}
.dots-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border2);font-size:10px}
.dots-row:last-child{border-bottom:none}
.dots{display:flex;gap:2px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%}
.dot.g{background:var(--green2)}.dot.y{background:var(--yellow)}.dot.r{background:var(--teal)}
.dot-label{font-size:9px;font-weight:600;color:var(--accent);margin-left:4px;white-space:nowrap}
.perlas-opt{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;margin-bottom:5px}
.perlas-opt:last-child{margin-bottom:0}
.perlas-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--accent)}
.perlas-desc{font-size:10px;color:var(--text2);margin-top:1px}
.perlas-note{font-size:9px;color:var(--text3);margin-top:4px;font-style:italic}
.temp-big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--accent);display:flex;align-items:flex-start;gap:3px}
.temp-big span{font-size:14px;margin-top:4px}
.temp-note{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.4}
.timeline{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 6px 4px;position:relative}
.timeline::before{content:'';position:absolute;top:22px;left:22px;right:22px;height:2px;background:var(--border)}
.tl-day{display:flex;flex-direction:column;align-items:center;gap:4px;z-index:1}
.tl-c{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;color:var(--text3);transition:all .3s}
.tl-c.active{border-color:var(--green2);background:var(--green3);color:var(--accent)}
.tl-c.done{border-color:var(--green);background:var(--green2);color:#fff}
.tl-lbl{font-size:8px;color:var(--text3);text-align:center;letter-spacing:.03em;line-height:1.2}
.tl-lbl.active{color:var(--accent)}
.step-list{list-style:none}
.step-item{display:flex;gap:8px;padding:5px 6px;border-bottom:1px solid var(--border2);align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-n{width:17px;height:17px;border-radius:50%;background:var(--green3);color:var(--accent);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--green2);margin-top:1px}
.step-t{font-size:10px;color:var(--text);line-height:1.4;flex:1}
.alert-item{border-left:3px solid;border-radius:0 4px 4px 0;padding:5px 10px;margin-bottom:5px;font-size:10px;line-height:1.4}
.alert-item:last-child{margin-bottom:0}
.alert-item.success{border-color:var(--green);background:rgba(46,204,113,.08);color:#a8e6bf}
.alert-item.warning{border-color:var(--yellow);background:rgba(243,156,18,.08);color:#f5cba7}
.alert-item.danger{border-color:var(--red);background:rgba(231,76,60,.08);color:#f1948a}
.alert-item.info{border-color:var(--blue);background:rgba(52,152,219,.08);color:#aed6f1}
.alert-title{font-weight:700;font-size:9px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.timer-block{display:flex;align-items:center;gap:8px;margin-top:4px}
.timer-disp{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--accent);font-variant-numeric:tabular-nums}
.btn-timer{font-size:10px;padding:4px 12px;border-radius:12px;border:1px solid var(--green2);background:rgba(46,204,113,.1);color:var(--green);cursor:pointer;font-weight:600;transition:background .15s}
.btn-timer:hover{background:rgba(46,204,113,.2)}
.timer-lbl{font-size:9px;color:var(--text3);margin-top:2px}
.confirm-step{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2);font-size:10px;color:var(--text2)}
.confirm-step:last-child{border-bottom:none}
.confirm-n{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--green);flex-shrink:0;width:16px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border2);font-size:10px}
.kv:last-child{border-bottom:none}
.kv-k{color:var(--text3)}.kv-v{font-weight:600;color:var(--text)}
.formula{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-family:monospace;font-size:10px;color:var(--accent);line-height:1.7}
.dil-row{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:7px 10px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.dil-row:last-child{margin-bottom:0}
.dil-factor{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--yellow)}
.dil-desc{font-size:10px;color:var(--text2)}
.check-item{display:flex;gap:6px;padding:4px 0;font-size:10px;color:var(--text2);align-items:flex-start}
.ci-ok{color:var(--green)}.ci-w{color:var(--yellow)}.ci-e{color:var(--red)}
.result-big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;color:var(--accent);text-align:center;padding:8px}
.result-unit{font-size:13px;color:var(--text3)}

/* ── FOOTER ── */
.proc-foot{background:var(--bg);border-top:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.foot-id{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--accent)}
.foot-name{font-size:10px;color:var(--text3)}
.foot-ver{font-size:9px;color:var(--text3)}

/* ── BUTTONS ── */
.btn-back{font-size:10px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}
.btn-back:hover{color:var(--text);border-color:var(--text3)}
.btn-fs{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);cursor:pointer;padding:4px 8px;font-size:13px;line-height:1;transition:color .15s,border-color .15s;flex-shrink:0}
.btn-fs:hover{color:var(--accent);border-color:var(--accent)}
.btn-day{font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(46,204,113,.05);color:var(--text3);cursor:pointer}
.btn-day:hover{border-color:var(--green2);color:var(--accent)}

/* ── PORTAL HEADER ── */
.portal-header{
  background:linear-gradient(135deg,#003e6b 0%,#005b99 100%);
  display:flex;align-items:center;gap:.8rem;
  padding:.55rem 1rem;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.35);
  position:relative;z-index:500;
}
.ph-logo{width:30px;height:30px;background:white;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ph-logo svg{width:18px;height:18px;}
.ph-brand{flex:1;}
.ph-brand .co{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;color:white;letter-spacing:.02em;}
.ph-brand .mo{font-size:.68rem;color:rgba(255,255,255,.55);font-weight:300;}
.ph-back{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:7px;color:white;cursor:pointer;padding:5px 11px;font-size:.75rem;font-family:'Barlow',sans-serif;display:flex;align-items:center;gap:4px;font-weight:600;white-space:nowrap;}
.ph-back:hover{background:rgba(255,255,255,.22);}
.ph-back svg{width:14px;height:14px;stroke:currentColor;}
</style>
</head>
<body>

<!-- ══════════════ HOME ══════════════ -->
<div class="screen active" id="screen-home">
  <div class="portal-header">
    <button class="ph-back" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Inicio

    <div class="ph-logo">
      <svg viewBox="0 0 34 34" fill="none">

    </div>
  </div>
  <div class="scrollable">
    <div class="grid" id="home-grid"></div>
  </div>
</div>

<!-- ══════════════ PROC PAGES ══════════════ -->
<div id="proc-screens"></div>

<script>
// ── DATA ──
const PROCS = [
  { id:'cloro', tag:'Agua potable', tagBg:'#0d1f35', tagColor:'#3498db',
    title:'Cloro libre', titleSub:'en agua potable',
    desc:'Método colorimétrico mediante fotómetro para control rutinario de calidad.',
    dur:'~15 min', area:'Calidad', steps:7,
    badges:[{t:'⏱ Análisis rápido',c:'green'},{t:'💧 Agua potable',c:'teal'},{t:'🔬 Fotométrico',c:'blue'}] },
  { id:'dbo5', tag:'Agua residual', tagBg:'#0d2a1a', tagColor:'#2ecc71',
    title:'DBO₅', titleSub:'en aguas residuales',
    desc:'Demanda Biológica de Oxígeno a 5 días por método respirométrico.',
    dur:'5 días', area:'EDAR', steps:10,
    badges:[{t:'⏱ 5 días',c:'green'},{t:'🌡 20 °C',c:'teal'},{t:'🫧 Respirométrico',c:'blue'}] },
  { id:'micro', tag:'Microbiología', tagBg:'#2d0d0d', tagColor:'#e74c3c',
    title:'E. coli y enterococos', titleSub:'en aguas residuales',
    desc:'Filtración y cultivo en medios selectivos. Confirmación con Kovacs.',
    dur:'18–48 h', area:'EDAR', steps:10,
    badges:[{t:'🧫 Filtración',c:'green'},{t:'⚠ Bioseguridad',c:'yellow'},{t:'🔬 UFC/100mL',c:'blue'}] },
  { id:'sequedad', tag:'Fangos', tagBg:'#2a1500', tagColor:'#c0874f',
    title:'Sequedad y materia volátil', titleSub:'en fangos de EDAR',
    desc:'% de sequedad (105 °C) y materia volátil (550 °C) en lodos.',
    dur:'~26 h', area:'EDAR', steps:8,
    badges:[{t:'🔥 105/550 °C',c:'yellow'},{t:'⚖ Gravimétrico',c:'green'},{t:'💧 Fangos',c:'blue'}] },
  { id:'solidos', tag:'Agua residual', tagBg:'#0d2a1a', tagColor:'#2ecc71',
    title:'Sólidos SS · SD · SSV', titleSub:'en aguas residuales',
    desc:'Sólidos en suspensión, disueltos y volátiles por filtración gravimétrica.',
    dur:'~26 h', area:'EDAR', steps:8,
    badges:[{t:'🔬 SS·SD·SSV',c:'blue'},{t:'🔥 105–550 °C',c:'yellow'},{t:'⚖ Filtración',c:'green'}] },
  { id:'v30', tag:'Control proceso', tagBg:'#1a0d2d', tagColor:'#9b59b6',
    title:'V30 — Sedimentables', titleSub:'licor mezcla EDAR',
    desc:'Volumen de sólidos sedimentados a 30 min. Indicador de decantabilidad.',
    dur:'30–60 min', area:'EDAR', steps:6,
    badges:[{t:'⏱ 30 min',c:'green'},{t:'📏 mL/L',c:'blue'},{t:'🌀 Licor mezcla',c:'teal'}] },
  { id:'turbidez', tag:'Agua residual', tagBg:'#0d2a1a', tagColor:'#2ecc71',
    title:'Turbidez', titleSub:'en agua',
    desc:'Medición directa en NTU mediante turbidímetro nefelométrico.',
    dur:'~5 min', area:'EDAR', steps:6,
    badges:[{t:'💡 Nefelométrico',c:'teal'},{t:'📊 NTU',c:'blue'},{t:'⚡ Rápido',c:'green'}] }
];

let activeTimers = {};

// ── HOME ──
function buildHome() {
  document.getElementById('home-grid').innerHTML = PROCS.map(p => `
    <div class="pc" onclick="openProc('${p.id}')">
      <div class="pc-tag" style="background:${p.tagBg};color:${p.tagColor}">${p.tag}</div>
      <div class="pc-title">${p.title}</div>
      <div class="pc-desc">${p.desc}</div>
      <div class="pc-meta"><span>⏱ ${p.dur}</span><span>📋 ${p.steps} pasos</span><span>🏭 ${p.area}</span></div>
    </div>`).join('');
}

function openProc(id) {
  document.getElementById('screen-home').classList.remove('active');
  document.querySelectorAll('.proc-screen').forEach(s => s.classList.remove('active'));
  document.getElementById('ps-' + id).classList.add('active');
}
function goHome() {
  Object.values(activeTimers).forEach(clearInterval); activeTimers = {};
  document.querySelectorAll('.proc-screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
}

// ── TABS ──
function switchTab(procId, tabId) {
  document.querySelectorAll('#ps-' + procId + ' .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#ps-' + procId + ' .tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('#ps-' + procId + ' .tab[data-tab="' + tabId + '"]').classList.add('active');
  document.getElementById('tp-' + procId + '-' + tabId).classList.add('active');
}

// ── TIMERS ──
function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function startTimer(key, total, dispId, btnId) {
  if (activeTimers[key]) { clearInterval(activeTimers[key]); delete activeTimers[key]; document.getElementById(btnId).textContent='Iniciar'; return; }
  const disp = document.getElementById(dispId), btn = document.getElementById(btnId);
  let rem = parseInt(disp.dataset.rem || total);
  btn.textContent = 'Pausar';
  activeTimers[key] = setInterval(() => {
    rem--; disp.dataset.rem = rem; disp.textContent = fmt(rem);
    if (rem <= 0) { clearInterval(activeTimers[key]); delete activeTimers[key]; btn.textContent='Fin ✓'; }
  }, 1000);
}
function markDay(d) {
  for (let i=0;i<=5;i++) {
    const el=document.getElementById('tld-'+i); if(!el) continue;
    const lb=el.nextElementSibling;
    if(i<d){el.className='tl-c done';lb.className='tl-lbl';}
    else if(i===d){el.className='tl-c active';lb.className='tl-lbl active';}
    else{el.className='tl-c';lb.className='tl-lbl';}
  }
}

        </div>
      </div>
    </div>
  </div>
  </div>` + footer('SEQ','Sequedad y Materia Volátil · Estufa 105°C / Mufla 550°C');
}
